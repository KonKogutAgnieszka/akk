<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="13">
  <text x="40" y="50" fill="#6b7280">// hooks/useProduct.ts</text>

  <text x="20" y="80" fill="#4b5563">1</text>
  <text x="40" y="80">
    <tspan fill="#c084fc">import</tspan>
    <tspan fill="#e5e7eb"> { useState, useEffect } </tspan>
    <tspan fill="#c084fc">from</tspan>
    <tspan fill="#86efac"> 'react'</tspan>
  </text>

  <text x="20" y="100" fill="#4b5563">2</text>

  <text x="20" y="120" fill="#4b5563">3</text>
  <text x="40" y="120">
    <tspan fill="#c084fc">export function</tspan>
    <tspan fill="#fde047"> useProduct</tspan>
    <tspan fill="#e5e7eb">(id: </tspan>
    <tspan fill="#60a5fa">string</tspan>
    <tspan fill="#e5e7eb">) {</tspan>
  </text>

  <text x="20" y="140" fill="#4b5563">4</text>
  <text x="60" y="140">
    <tspan fill="#c084fc">const</tspan>
    <tspan fill="#e5e7eb"> [product, setProduct] = </tspan>
    <tspan fill="#fde047">useState</tspan>
    <tspan fill="#94a3b8">&lt;</tspan>
    <tspan fill="#60a5fa">any</tspan>
    <tspan fill="#94a3b8">&gt;</tspan>
    <tspan fill="#e5e7eb">(</tspan>
    <tspan fill="#f472b6">null</tspan>
    <tspan fill="#e5e7eb">)</tspan>
  </text>

  <text x="20" y="160" fill="#4b5563">5</text>
  <text x="60" y="160">
    <tspan fill="#c084fc">const</tspan>
